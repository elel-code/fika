[package]
name = "fika"
edition = "2024"
license = "MIT"
publish = false
default-run = "fika"

[lib]
name = "fika_core"

[dependencies]
async-io = "*"
futures-lite = "*"
gpui = { git = "https://github.com/zed-industries/zed", package = "gpui" }
gpui_platform = { git = "https://github.com/zed-industries/zed", package = "gpui_platform", features = ["wayland", "x11"] }
notify = "*"
tokio = { version = "*", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread", "sync", "time"] }
zbus = "*"
zbus_polkit = "*"
