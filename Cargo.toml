[package]
name = "fika"
version = "0.1.0"
edition = "2024"
description = "A lightweight Rust + Slint file manager prototype for Wayland desktops."
license = "MIT"
build = "build.rs"
default-run = "fika"

[dependencies]
notify = "8"
futures-lite = "2.6.0"
image = { version = "0.25.10", default-features = false, features = ["jpeg", "png", "webp"] }
slint = { git = "https://github.com/slint-ui/slint", branch = "master", features = ["image-default-formats", "unstable-winit-030"] }
tokio = { version = "1", features = ["fs", "macros", "process", "rt-multi-thread", "sync", "time"] }
zbus = "5.16.0"
zbus_polkit = "5.0.0"

[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint", branch = "master" }

[patch.crates-io]
icu_segmenter = { path = "vendor/icu_segmenter-2.2.0" }
