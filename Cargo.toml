[package]
name = "fika"
edition = "2024"
license = "MIT"
publish = false
default-run = "fika"

[lib]
name = "fika_core"

[dependencies]
futures-lite = "2"
gpui = { git = "https://github.com/zed-industries/zed", package = "gpui" }
gpui_platform = { git = "https://github.com/zed-industries/zed", package = "gpui_platform", features = ["wayland", "x11"] }
notify = "8"
tokio = { version = "1", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread", "sync", "time"] }
zbus = { version = "5", default-features = false }
zbus_polkit = { version = "5", default-features = false }
